<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FP Sellection</title>
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="logo-fp">
        <nav>
            <ul>
                <li>Home</li>
                <li>Cars</li>
                <li>Talk to us</li>
            </ul>
        </nav>
    </header>
    
    <section>
        <div class="list">
            <div class="item">
                <div class="car-img">
                    <img src="./img/1.png" alt="Porsche-Image">
                </div>
                <div class="content">
                    <p class="car-information">
                        Único Dono
                    </p>
                    <h2>
                        Porsche
                    </h2>
                    <p class="description">
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Beatae veniam sequi quos quibusdam debitis. Asperiores magni animi eveniet sequi aliquid quos dolores officia culpa. Omnis corporis temporibus vero earum soluta.
                    </p>
                    <button>
                        Learn more
                    </button>
                </div>
            </div>
        </div>

        <div class="arrows">
            <button><img src="img/arrow.png" alt="left-arrow"></button>
            <button><img src="img/arrow.png" alt="right-arrow"></button>
        </div>

        <div class="indicators">
            <div class="number">01</div>
            <ul>
                <li class="active"></li>
                <li></li>
                <li></li>
            </ul>
        </div>
    </section>
</body>
</html>
